version: 2
seeds:
  - name: budget_daily
    description: Departmental day-level budget (USD). Demo seed; Live table preferred.
    columns:
      - name: date
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: budget_usd
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date, department]

  - name: storage_demo_seed
    description: "Synthetic STORAGE_USAGE data for DEMO_MODE (4 databases x 75 days)."
    columns:
      - name: USAGE_DATE
        tests: [not_null]
      - name: DATABASE_NAME
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [USAGE_DATE, DATABASE_NAME]

  - name: query_history_demo_seed
    description: "Synthetic QUERY_HISTORY data for DEMO_MODE, aligned to demo metering warehouses."
    columns:
      - name: QUERY_ID
        tests: [not_null, unique]
      - name: WAREHOUSE_NAME
        tests: [not_null]
