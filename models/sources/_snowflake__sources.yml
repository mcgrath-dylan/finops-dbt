version: 2

sources:
  - name: account_usage
    description: Snowflake Account Usage schema
    database: "{{ var('account_usage_database', 'SNOWFLAKE') }}"
    schema: "{{ var('account_usage_schema', 'ACCOUNT_USAGE') }}"
    config:
      freshness:
        warn_after: {count: 48, period: hour}
        error_after: {count: 96, period: hour}
    tables:
      - name: WAREHOUSE_METERING_HISTORY
        config:
          loaded_at_field: START_TIME
      - name: QUERY_HISTORY
        config:
          loaded_at_field: END_TIME
      - name: DATABASE_STORAGE_USAGE_HISTORY
        config:
          loaded_at_field: cast(USAGE_DATE as timestamp_ntz)
        # Daily snapshot; one row per database per day.
        # Columns: USAGE_DATE, DATABASE_ID, DATABASE_NAME,
        #          AVERAGE_DATABASE_BYTES, AVERAGE_FAILSAFE_BYTES,
        #          plus newer lifecycle-policy columns on some accounts.
