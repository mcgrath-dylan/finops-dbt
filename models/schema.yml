# models/schema.yml  (Starter)
version: 2

models:
  - name: fct_daily_costs
    description: "Daily compute/idle/cloud-services/total cost by warehouse. $$ from metering history; query-level $$ are estimates only."
    config:
      contract:
        enforced: true
    tests:
      - unique:
          column_name: daily_cost_key
    columns:
      - name: usage_date           # ::date
        data_type: date
        tests: [not_null]
      - name: warehouse_name       # ::varchar
        data_type: varchar
        tests:
          - relationships:
              arguments:
                to: ref('stg_warehouse_metering')
                field: warehouse_name
      - name: compute_credits      # ::number(38,3)
        data_type: number
      - name: compute_cost         # ::number(38,2)
        data_type: number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
      - name: cloud_services_cost  # ::number(38,2)
        data_type: number
      - name: total_cost           # ::number(38,2)
        data_type: number
      - name: idle_cost            # ::number(38,2)
        data_type: number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
      - name: productive_cost      # ::number(38,2)
        data_type: number
      - name: total_queries        # ::number(38,0)
        data_type: number
      - name: avg_concurrent_users # ::number(38,2)
        data_type: number
      - name: cost_per_query       # ::number(38,4)
        data_type: number
      - name: efficiency_score     # ::number(5,2)
        data_type: number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0, max_value: 100, row_condition: "efficiency_score is not null"}
      - name: month_to_date_cost   # ::number(38,2)
        data_type: number
      - name: cost_7day_avg        # ::number(38,2)
        data_type: number
      - name: day_over_day_change  # ::number(38,2)
        data_type: number
      - name: week_over_week_change # ::number(38,2)
        data_type: number
      - name: daily_cost_key       # surrogate key
        data_type: varchar
      - name: _loaded_at           # cast(current_timestamp() as timestamp_ntz)
        data_type: timestamp_ntz
  - name: stg_warehouse_metering
    columns:
      - name: usage_hour_ntz
        tests: [not_null]
      - name: metering_id
        tests:
          - not_null
          - unique
      - name: compute_cost_usd
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
      - name: total_credits_used
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
  - name: stg_query_history
    columns:
      - name: usage_hour_ntz
        tests: [not_null]
      - name: query_id
        tests:
          - not_null
          - unique
      - name: total_elapsed_seconds
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
  - name: int_hourly_compute_costs
    columns:
      - name: usage_hour_ntz
        tests: [not_null]
      - name: cost_hour_key
        tests:
          - not_null
          - unique
  - name: fct_cost_by_department
    columns:
      - name: usage_date
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: total_cost_usd
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
  - name: fct_budget_vs_actual
    columns:
      - name: usage_date
        tests:
          - not_null
      - name: department
        tests:
          - not_null
      - name: budget_usd
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: {min_value: 0}
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [usage_date, department]
  - name: dim_department
    columns:
      - name: warehouse_name
        tests:
          - not_null
          - unique
      - name: department
        tests: [not_null]
